<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Egy Quran</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c5a059">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Egy Quran">
    <link rel="apple-touch-icon" href="icon.png">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6JJ4WGLT89"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6JJ4WGLT89');
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #f8faf9; --bg-mid: #ffffff; --bg-light: #f0f4f2;
            --accent-gold: #c5a059; --accent-hover: #b38f4d;
            --text-main: #2c3e50; --text-muted: #7f8c8d;
            --glass-bg: rgba(0, 0, 0, 0.04); --glass-border: rgba(0, 0, 0, 0.05);
            --glass-active: rgba(197, 160, 89, 0.08);
            --player-bg: rgba(255, 255, 255, 0.98);
            --shadow-intensity: rgba(0, 0, 0, 0.05);
        }

        body.dark-theme {
            --bg-dark: #121212; --bg-mid: #1c1c1c; --bg-light: #252525;
            --text-main: #ffffff; --text-muted: #9a9a9a;
            --glass-bg: rgba(255, 255, 255, 0.06); --glass-border: rgba(255, 255, 255, 0.08);
            --glass-active: rgba(197, 160, 89, 0.12);
            --player-bg: rgba(26, 26, 26, 0.98);
            --shadow-intensity: rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg-dark); color: var(--text-main); min-height: 100vh; padding-bottom: 140px; user-select: none; }
        
        .container { width: 100%; max-width: 480px; margin: 0 auto; padding: 16px; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; }
        .top-bar-group { display: flex; gap: 8px; align-items: center; }
        .top-btn { background: transparent; border: 1px solid var(--glass-border); color: var(--text-muted); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-weight: 700; font-size: 0.75rem; text-decoration: none; }
        .top-btn:hover { background: var(--glass-active); color: var(--accent-gold); border-color: var(--accent-gold); }
        .top-btn svg { width: 18px; height: 18px; }
        .email-btn:hover, .email-btn:active { color: #3b82f6 !important; border-color: #3b82f6 !important; background: rgba(59, 130, 246, 0.08) !important; }
        
        header { text-align: center; padding-bottom: 10px; }
        .header-img { height: 85px; width: 85px; border-radius: 50%; border: 2px solid var(--accent-gold); box-shadow: 0 4px 20px var(--shadow-intensity); object-fit: cover; margin-bottom: 10px; }
        header h1 { font-size: 1.25rem; font-weight: 300; }
        header h1 strong { font-weight: 700; color: var(--accent-gold); }
        header p { font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; }

        /* القراء */
        .sheikh-selector-wrapper { width: 100%; margin: 10px 0; }
        .sheikh-list { display: flex; gap: 12px; overflow-x: auto; padding: 5px 5px 15px 5px; scrollbar-width: none; }
        .sheikh-list::-webkit-scrollbar { display: none; }
        .sheikh-item { background: var(--bg-mid); border: 1px solid var(--glass-border); border-radius: 16px; padding: 10px; min-width: 95px; text-align: center; cursor: pointer; transition: 0.2s; box-shadow: 0 3px 8px var(--shadow-intensity); }
        .sheikh-item.active { border-color: var(--accent-gold); background: var(--glass-active); transform: translateY(-2px); }
        .sheikh-avatar-container { position: relative; width: 50px; height: 50px; margin: 0 auto; }
        .sheikh-avatar-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        
        @keyframes equalize { 0% { transform: scaleY(0.3); } 100% { transform: scaleY(1); } }
        .playing-badge { position: absolute; bottom: -3px; right: -3px; width: 22px; height: 22px; background: var(--accent-gold); border-radius: 50%; border: 2px solid var(--bg-mid); display: flex; align-items: flex-end; justify-content: center; gap: 2px; padding-bottom: 5px; }
        .equalizer-bar { width: 2px; background: #fff; height: 10px; transform-origin: bottom; }

        /* الختمات (Chips) سطر واحد سكرول */
        .editions-container { 
            display: flex; gap: 8px; overflow-x: auto; 
            padding: 5px 5px 15px 5px; margin-bottom: 10px;
            scrollbar-width: none; -ms-overflow-style: none; 
            direction: rtl; 
        }
        .editions-container::-webkit-scrollbar { display: none; }
        .edition-chip { 
            flex-shrink: 0; background: var(--bg-mid); border: 1px solid var(--glass-border); border-radius: 10px; 
            padding: 6px 14px; font-size: 0.7rem; font-weight: 700; color: var(--text-muted); 
            cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 5px var(--shadow-intensity); white-space: nowrap;
        }
        .edition-chip.active { background: var(--glass-active); border-color: var(--accent-gold); color: var(--accent-gold); }

        /* قائمة السور */
        .surah-list-container { display: flex; flex-direction: column; gap: 6px; }
        .surah-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--bg-mid); border: 1px solid var(--glass-border); border-radius: 12px; transition: 0.15s; }
        .surah-row.active-row { border-color: var(--accent-gold); background: var(--glass-active); }
        .surah-info { display: flex; align-items: center; gap: 12px; }
        .surah-number { font-size: 0.75rem; color: var(--accent-gold); font-weight: 700; min-width: 24px; }
        .surah-name { font-size: 0.8rem; font-weight: 700; color: var(--text-main); }
        .surah-actions { display: flex; align-items: center; gap: 8px; }
        .surah-action-btn { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--bg-light); border: 1px solid var(--glass-border); color: var(--text-muted); cursor: pointer; text-decoration: none; transition: all 0.2s; }
        .active-row .play-cell { background: var(--accent-gold); color: #fff; border-color: var(--accent-gold); }

        /* المشغل */
        .floating-player { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 440px; background: var(--player-bg); backdrop-filter: blur(20px); border-radius: 16px; border: 1px solid var(--glass-border); padding: 6px 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); display: none; z-index: 1000; }
        .player-seekbar-container { width: 100%; height: 12px; display: flex; align-items: center; cursor: pointer; direction: ltr; margin-bottom: 2px; }
        .player-seekbar-track { width: 100%; height: 4px; background: rgba(0,0,0,0.05); border-radius: 10px; position: relative; }
        .player-seekbar-fill { height: 100%; background: var(--accent-gold); width: 0%; border-radius: 10px; position: relative; }
        .player-seekbar-thumb { position: absolute; right: -6px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; background: #fff; border: 2px solid var(--accent-gold); border-radius: 50%; }
        .play-toggle-btn { background: var(--accent-gold); color: #fff; border: none; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(197, 160, 89, 0.4); }
        .icon-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .icon-btn.active-feature { color: var(--accent-gold) !important; }

        .toast { position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text-main); color: var(--bg-mid); padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 10000; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>

    <div class="container">
        <div class="top-bar">
            <div class="top-bar-group">
                <button class="top-btn" onclick="toggleTheme()" id="theme-toggle-btn"></button>
                <!-- أيقونة البريد التي سألت عنها -->
                <a href="mailto:contact@example.com" class="top-btn email-btn" title="تواصل معنا">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                </a>
            </div>
            <button class="top-btn" onclick="toggleLanguage()"><span id="lang-label">EN</span></button>
        </div>

        <header>
            <img src="" id="header-avatar-img" class="header-img">
            <h1 id="main-title"></h1>
            <p id="header-subtitle"></p>
        </header>

        <div class="sheikh-selector-wrapper"><div class="sheikh-list" id="sheikh-carousel"></div></div>
        <div class="editions-container" id="editions-chips-list"></div>
        <div class="surah-list-container" id="main-surah-list"></div>
    </div>

    <div class="floating-player" id="global-player">
        <div class="player-seekbar-container" id="progress-container">
            <div class="player-seekbar-track"><div class="player-seekbar-fill" id="progress-bar-fill"><div class="player-seekbar-thumb"></div></div></div>
        </div>
        <div style="display:flex; flex-direction:column; gap:6px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div id="player-track-title" style="font-size:0.8rem; font-weight:700;"></div>
                <div style="font-size:0.65rem; color:var(--text-muted);"><span id="curr-time">00:00</span> / <span id="total-time">00:00</span></div>
            </div>
            <div style="display:flex; align-items:center; justify-content:space-between; direction:ltr;">
                <div style="width:24px"></div>
                <div style="display:flex; align-items:center; gap:16px;">
                    <button class="icon-btn" onclick="playPrevious()"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                    <button class="play-toggle-btn" id="player-play-btn" onclick="togglePlayPause()"></button>
                    <button class="icon-btn" onclick="playNext()"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                </div>
                <button class="icon-btn active-feature" id="btn-autonext" onclick="toggleAutoNext()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg></button>
            </div>
        </div>
    </div>

    <script>
        const editionsConfig = {
            "husary": { 1: { pillAr: "حفص (الإذاعة)", pillEn: "Hafs", file: "husary_1.json", descAr: "الإذاعة المصرية", descEn: "Radio" }, 2: { pillAr: "ورش", pillEn: "Warsh", file: "husary_2.json", descAr: "ورش عن نافع", descEn: "Warsh" }, 3: { pillAr: "قالون", pillEn: "Qalun", file: "husary_3.json", descAr: "قالون عن نافع", descEn: "Qalun" }, 4: { pillAr: "الدوري", pillEn: "Al-Duri", file: "husary_4.json", descAr: "الدوري عن أبي عمرو", descEn: "Al-Duri" }, 5: { pillAr: "المجود", pillEn: "Mujawwad", file: "husary_5.json", descAr: "التلاوة المجودة", descEn: "Mujawwad" } },
            "minshawi": { 1: { pillAr: "حفص (الإذاعة)", pillEn: "Hafs", file: "minshawi_1.json", descAr: "الإذاعة المصرية", descEn: "Radio" }, 2: { pillAr: "الختمة الثانية", pillEn: "2nd Khatma", file: "minshawi_2.json", descAr: "الختمة المفقودة", descEn: "Lost Khatma" } },
            "mustafa": { 1: { pillAr: "حفص", pillEn: "Hafs", file: "mustafa_1.json", descAr: "الإذاعة المصرية", descEn: "Radio" } },
            "banna": { 1: { pillAr: "حفص", pillEn: "Hafs", file: "banna_1.json", descAr: "الإذاعة المصرية", descEn: "Radio" } },
            "basit": { 1: { pillAr: "حفص", pillEn: "Hafs", file: "basit_1.json", descAr: "الإذاعة المصرية", descEn: "Radio" } }
        };

        const recitersList = [
            { id: "husary", nameAr: "محمود خليل الحصري", nameEn: "Al-Husary", image: "hosary.jpg" },
            { id: "minshawi", nameAr: "محمد صديق المنشاوي", nameEn: "Al-Minshawi", image: "minshawy.jpg" },
            { id: "mustafa", nameAr: "مصطفى إسماعيل", nameEn: "Mustafa Ismail", image: "mustafa.jpg" },
            { id: "banna", nameAr: "محمود علي البنا", nameEn: "Al-Banna", image: "banna.jpg" },
            { id: "basit", nameAr: "عبد الباسط عبد الصمد", nameEn: "Abdul Basit", image: "basit.jpg" }
        ];

        let currentLang = 'ar', currentTheme = 'light', currentSheikhId = "husary", currentEdition = 1;
        let activeSurahsData = [], playingSurahId = null, isAutoNext = true, audioInstance = new Audio();
        let savedReciterEditions = {};

        const icons = {
            play: '<svg viewBox="0 0 24 24" fill="currentColor" width="16"><path d="M8 5v14l11-7z"/></svg>',
            pause: '<svg viewBox="0 0 24 24" fill="currentColor" width="16"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>',
            sun: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>',
            moon: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
        };

        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }

        async function selectSheikh(id) {
            currentSheikhId = id; currentEdition = savedReciterEditions[id] || 1;
            const s = recitersList.find(r => r.id === id);
            document.getElementById('header-avatar-img').src = s.image;
            document.getElementById('main-title').innerHTML = (currentLang === 'ar' ? 'الشيخ ' : 'Sheikh ') + `<strong>${currentLang === 'ar' ? s.nameAr : s.nameEn}</strong>`;
            renderSheikhCarousel(); renderEditionChips(); await loadEditionData(id, currentEdition);
        }

        function renderEditionChips() {
            const configs = editionsConfig[currentSheikhId], keys = Object.keys(configs);
            document.getElementById('editions-chips-list').innerHTML = keys.map(k => `<div class="edition-chip ${currentEdition == k ? 'active' : ''}" onclick="changeEdition(${k})">${currentLang === 'ar' ? configs[k].pillAr : configs[k].pillEn}</div>`).join('');
            document.getElementById('header-subtitle').innerText = currentLang === 'ar' ? configs[currentEdition].descAr : configs[currentEdition].descEn;
        }

        async function changeEdition(n) { if(currentEdition==n) return; currentEdition=n; savedReciterEditions[currentSheikhId]=n; renderEditionChips(); await loadEditionData(currentSheikhId, n); }

        async function loadEditionData(sid, enum1) {
            const file = editionsConfig[sid][enum1].file;
            try { const res = await fetch(file); activeSurahsData = await res.json(); renderSurahsList(); } catch(e) {}
        }

        function renderSheikhCarousel() {
            document.getElementById('sheikh-carousel').innerHTML = recitersList.map(s => `<div class="sheikh-item ${s.id === currentSheikhId ? 'active' : ''}" onclick="selectSheikh('${s.id}')"><div class="sheikh-avatar-container"><img src="${s.image}" class="sheikh-avatar-img"></div><div style="font-size:0.65rem; font-weight:700; margin-top:6px;">${currentLang === 'ar' ? s.nameAr : s.nameEn}</div></div>`).join('');
            syncUIWithAudioState();
        }

        function renderSurahsList() {
            document.getElementById('main-surah-list').innerHTML = activeSurahsData.map(s => `<div class="surah-row" data-id="${s.id}"><div class="surah-info"><span class="surah-number">${String(s.id).padStart(3, '0')}</span><span class="surah-name">${currentLang==='ar'?'سورة ':'Surah '}${s.name}</span></div><div class="surah-actions"><button class="surah-action-btn play-cell" onclick="playSurah(${s.id}, '${s.url}')">${icons.play}</button></div></div>`).join('');
            syncUIWithAudioState();
        }

        function playSurah(id, url) {
            if (playingSurahId === id) { togglePlayPause(); return; }
            playingSurahId = id; audioInstance.src = url; audioInstance.play();
            document.getElementById('global-player').style.display = 'block';
            document.getElementById('player-track-title').innerText = activeSurahsData.find(s=>s.id===id).name;
            syncUIWithAudioState();
        }

        function togglePlayPause() { audioInstance.paused ? audioInstance.play() : audioInstance.pause(); syncUIWithAudioState(); }
        function playNext() { const idx = activeSurahsData.findIndex(s => s.id === playingSurahId); if (idx < activeSurahsData.length - 1) playSurah(activeSurahsData[idx+1].id, activeSurahsData[idx+1].url); }
        function playPrevious() { const idx = activeSurahsData.findIndex(s => s.id === playingSurahId); if (idx > 0) playSurah(activeSurahsData[idx-1].id, activeSurahsData[idx-1].url); }
        
        function syncUIWithAudioState() {
            const isP = !audioInstance.paused; document.getElementById('player-play-btn').innerHTML = isP ? icons.pause : icons.play;
            document.querySelectorAll('.surah-row').forEach(r => {
                const id = parseInt(r.dataset.id); const active = id === playingSurahId;
                r.classList.toggle('active-row', active); r.querySelector('.play-cell').innerHTML = active ? (isP ? icons.pause : icons.play) : icons.play;
            });
        }

        audioInstance.onended = () => { if(isAutoNext) playNext(); };
        audioInstance.ontimeupdate = () => { if(audioInstance.duration) { document.getElementById('progress-bar-fill').style.width = (audioInstance.currentTime/audioInstance.duration*100)+'%'; document.getElementById('curr-time').innerText = formatTime(audioInstance.currentTime); document.getElementById('total-time').innerText = formatTime(audioInstance.duration); } };
        function formatTime(s) { const m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0'+sec:sec}`; }
        
        function toggleAutoNext() { isAutoNext = !isAutoNext; document.getElementById('btn-autonext').classList.toggle('active-feature', isAutoNext); showToast(currentLang==='ar'?(isAutoNext?'تفعيل التلقائي':'إيقاف التلقائي'):'Auto-Next Toggle'); }
        function toggleTheme() { currentTheme = currentTheme==='light'?'dark':'light'; document.body.className = currentTheme==='dark'?'dark-theme':''; document.getElementById('theme-toggle-btn').innerHTML = currentTheme==='dark'?icons.moon:icons.sun; }
        function toggleLanguage() { currentLang = currentLang==='ar'?'en':'ar'; document.documentElement.dir = currentLang==='ar'?'rtl':'ltr'; selectSheikh(currentSheikhId); }

        (async () => { document.getElementById('theme-toggle-btn').innerHTML = icons.sun; await selectSheikh('husary'); })();
    </script>
</body>
</html>
